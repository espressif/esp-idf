workflow:
  rules:
    # esp-at: allow pushes of esp-at/v* branches so they can be mirrored to GitHub.
    # Only the github-sync job runs for these branches (see rules below).
    - if: '$CI_COMMIT_BRANCH =~ /^esp-at\/v/ && $CI_PIPELINE_SOURCE == "push"'
      variables:
        PIPELINE_COMMIT_SHA: $CI_COMMIT_SHA
        IS_MR_PIPELINE: 0
    # Disable those non-protected push triggered pipelines
    - if: '$CI_COMMIT_REF_NAME != "master" && $CI_COMMIT_BRANCH !~ /^release\/v/ && $CI_COMMIT_TAG !~ /^v\d+\.\d+(\.\d+)?($|-)/ && $CI_COMMIT_TAG !~ /^qa-test/ && $CI_PIPELINE_SOURCE == "push"'
      when: never
    # when running merged result pipelines, CI_COMMIT_SHA represents the temp commit it created.
    # Please use PIPELINE_COMMIT_SHA at all places that require a commit sha of the original commit.
    - if: $CI_OPEN_MERGE_REQUESTS != null
      variables:
        PIPELINE_COMMIT_SHA: $CI_MERGE_REQUEST_SOURCE_BRANCH_SHA
        IS_MR_PIPELINE: 1
    - if: $CI_OPEN_MERGE_REQUESTS == null
      variables:
        PIPELINE_COMMIT_SHA: $CI_COMMIT_SHA
        IS_MR_PIPELINE: 0
    - when: always

# Place the default settings in `.gitlab/ci/common.yml` instead

include:
  # esp-at: This block is intentionally different from master/release branches.
  # Keep these edits ONLY on esp-at/v* branches and NEVER merge them into master,
  # otherwise master's normal CI would lose all these jobs.
  # Only the files required by the github-mirror job are kept; the rest are disabled
  # so that pushing an esp-at/v* branch only runs push_to_github.
  - '.gitlab/ci/common.yml'   # stages, default variables and before_script templates
  - '.gitlab/ci/rules.yml'    # rule templates used by the deploy jobs
  - '.gitlab/ci/deploy.yml'   # check_submodule_sync + push_to_github (github mirror)
