name: OT Border Router + RCP - Full Setup
command: idf.py -C examples/openthread/ot_rcp set-target {{rcp_target}} && idf.py -C examples/openthread/ot_rcp -p {{rcp_port}} build flash && idf.py -C examples/openthread/ot_br set-target {{br_target}} && idf.py -C examples/openthread/ot_br -p {{br_port}} build flash monitor
description: Build and flash both the RCP (radio) and Border Router firmware. Flash RCP first, then the Border Router. Opens monitor on the BR after flashing.
tags: ["openthread", "otbr", "rcp", "radio", "border-router", "setup"]
arguments:
  - name: rcp_target
    description: Target SoC for RCP (must support 802.15.4, e.g. esp32h2)
    default_value: esp32h2
  - name: rcp_port
    description: Serial port for the RCP device
    default_value: COM4
  - name: br_target
    description: Target SoC for Border Router (must support Wi-Fi, e.g. esp32c6)
    default_value: esp32c6
  - name: br_port
    description: Serial port for the Border Router device
    default_value: COM3
