# Documentation: .gitlab/ci/README.md#manifest-file-to-control-the-buildtest-apps

components/mbedtls/test_apps/mbedtls_ut:
  disable:
    - if: CONFIG_NAME == "aes_no_hw" and SOC_AES_SUPPORTED != 1
    - if: CONFIG_NAME == "psram" and SOC_SPIRAM_SUPPORTED != 1
    - if: CONFIG_NAME == "psram_all_ext" and SOC_SPIRAM_SUPPORTED != 1
    - if: CONFIG_NAME == "psram_all_ext_flash_enc" and SOC_SPIRAM_SUPPORTED != 1
    - if: CONFIG_NAME == "psram_all_ext_flash_enc_f4r8" and IDF_TARGET != "esp32s3"
    - if: CONFIG_NAME == "ecdsa_sign" and SOC_ECDSA_SUPPORTED != 1
    - if: CONFIG_NAME == "hmac_opaque" and SOC_HMAC_SUPPORTED != 1
  disable_test:
    - if: CONFIG_NAME == "psram_all_ext_flash_enc" and IDF_TARGET not in ["esp32", "esp32p4", "esp32c5"]
      reason: lack of runners
    - if: CONFIG_NAME == "hmac_opaque" and IDF_TARGET not in ["esp32c3"]
      reason: lack of runners
  depends_components:
    - mbedtls
    - esp_security
    - esp_hal_security
    - esp_driver_dma
    - esp_hal_dma
    - esp_mm
    - esp_hw_support

components/mbedtls/test_apps/persistent_storage_format:
  disable:
    - if: CONFIG_NAME not in ["hmac", "ecdsa"]
      reason: this app has no default config; only the hmac and ecdsa overlays are exercised
    - if: CONFIG_NAME == "hmac" and IDF_TARGET != "esp32c3"
      reason: nvs_encr_hmac runner (HMAC + RSA-DS persistent format consume) is esp32c3 only
    - if: CONFIG_NAME == "ecdsa" and IDF_TARGET != "esp32h2"
      reason: ECDSA persistent format consume runner is esp32h2 only
  depends_components:
    - mbedtls
    - esp_security
    - esp_hal_security
    - nvs_flash
